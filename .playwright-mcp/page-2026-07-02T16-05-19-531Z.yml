          - button "How do I register?" [ref=f1e498] [cursor=pointer]:
            - generic [ref=f1e499]: How do I register?
          - generic:
            - paragraph: Hit Sign Up, create your account, and register your team or join as a free agent. Full teams pick their division during registration — free agents get placed on a roster that needs players in the right division.
        - listitem [ref=f1e501]:
          - button "I don't have a team. Can I still play?" [ref=f1e502] [cursor=pointer]:
            - generic [ref=f1e503]: I don't have a team. Can I still play?
          - generic:
            - paragraph: Absolutely. Register as a free agent and we'll place you on a team in the division that matches your level. It's one of the best ways to meet people who hoop.
        - listitem [ref=f1e505]:
          - button "Which division should I join?" [ref=f1e506] [cursor=pointer]:
            - generic [ref=f1e507]: Which division should I join?
          - generic:
            - paragraph: Divisions run from Rookie (new to the game) up to Hall of Fame (college and advanced players). If you're unsure, check the division descriptions on our League page — and don't stress, teams can move up or down between seasons so games stay competitive.
        - listitem [ref=f1e509]:
          - button "What's included in a season?" [ref=f1e510] [cursor=pointer]:
            - generic [ref=f1e511]: What's included in a season?
          - generic:
            - paragraph: Seven regular season games plus guaranteed playoffs, certified referees and scorekeepers, full game recordings on YouTube, tracked player stats, and championship rings and gear for the winners.
        - listitem [ref=f1e513]:
          - button "How do the Fil divisions work?" [ref=f1e514] [cursor=pointer]:
            - generic [ref=f1e515]: How do the Fil divisions work?
          - generic:
            - paragraph: Fil – Great, Fil – Pro, and Fil – Rookie are open to Filipino players, with one import (non-Filipino player) allowed per team. Skill levels mirror the open divisions.
        - listitem [ref=f1e517]:
          - button "Where and when are games played?" [ref=f1e518] [cursor=pointer]:
            - generic [ref=f1e519]: Where and when are games played?
          - generic:
            - paragraph: The full schedule is posted before the season starts and available on the Schedule page, with locations and tip-off times for every game. Standings update the same night games are played.
        - listitem [ref=f1e521]:
          - button "Are my stats really tracked?" [ref=f1e522] [cursor=pointer]:
            - generic [ref=f1e523]: Are my stats really tracked?
          - generic:
            - paragraph: Every game. Points, rebounds, assists and more are recorded by official scorekeepers, feed into the season leaders and MVP ladder, and build your career profile across seasons.
        - listitem [ref=f1e525]:
          - button "What's the refund policy?" [ref=f1e526] [cursor=pointer]:
            - generic [ref=f1e527]: What's the refund policy?
          - generic:
            - paragraph:
              - text: Full details live on our
              - link "Refund Policy" [ref=f1e529] [cursor=pointer]:
                - /url: /refund-policy/
              - text: page — give it a read before registering so there are no surprises.
